performance-tests:
  name: 3. Performance Tests (k6)
  needs: code-tests
  runs-on: ubuntu-latest
  
  services:
    postgres:
      image: postgres:15-alpine
      env:
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: postgres
        POSTGRES_DB: RecipeManagerDb
      ports:
        - 5432:5432
      options: >-
        --health-cmd pg_isready
        --health-interval 10s
        --health-timeout 5s
        --health-retries 5
  
  steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Start API in Background
      run: |
        # Впевніться, що шлях до src/Api правильний для вашого проекту
        dotnet run --project src/Api --configuration Release &
        sleep 20 # Збільшив час очікування, щоб API встигло піднятися
      env:
        ConnectionStrings__DefaultConnection: "Host=localhost;Port=5432;Database=RecipeManagerDb;Username=postgres;Password=postgres"
        ASPNETCORE_ENVIRONMENT: Development

    - name: Install k6
      run: |
        sudo gpg -k
        sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
        echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
        sudo apt-get update
        sudo apt-get install k6

    - name: Run k6 Smoke Test
      run: k6 run tests/k6-tests/smoke.js